    <!-- 核心圖標庫 -->

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #050505;
            color: #f3f4f6;
            margin: 0;
            overflow-x: hidden;
        }

        .gold-text {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.1);
        }

        .card-gradient {
            background: linear-gradient(180deg, rgba(24, 24, 27, 0.8) 0%, rgba(10, 10, 10, 1) 100%);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        /* 表單彈窗優化 */
        #form-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            backdrop-filter: blur(10px);
            padding: 15px;
            align-items: center;
            justify-content: center;
        }
        
        .form-container {
            width: 100%;
            max-width: 850px;
            height: 90vh;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(251, 191, 36, 0.25);
        }

        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        .btn-shine::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: 0.8s;
        }
        .btn-shine:hover::after { left: 100%; top: 100%; }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .animate-pulse-slow { animation: pulse-slow 3s infinite; }
        
        iframe {
            background-color: #ffffff;
        }
    </style>
</head>

    <!-- Google 表單彈窗 -->
    <div id="form-modal" onclick="closeModal()">
        <div class="form-container" onclick="event.stopPropagation()">
            <!-- 關閉按鈕 -->
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/80 hover:bg-black text-white w-10 h-10 rounded-full flex items-center justify-center z-50 border border-white/10 transition-transform active:scale-90 shadow-2xl">

            </button>
            
            <!-- iframe 嵌入 -->
            <div class="w-full h-full overflow-hidden">

            </div>
        </div>
    </div>

    <script>
        // 初始化 Lucide 圖標
        function initIcons() {
            if (window.lucide) {
                window.lucide.createIcons();
            } else {
                setTimeout(initIcons, 100);
            }
        }
        window.onload = initIcons;

        // 彈窗控制
        const modal = document.getElementById('form-modal');
        function openModal() {
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // 防止背景滾動
            initIcons(); // 確保彈窗內圖標渲染
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 監聽 ESC 鍵關閉彈窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // 捲動時 Header 效果
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.style.backgroundColor = 'rgba(5, 5, 5, 0.95)';
                header.style.paddingBlock = '0.5rem';
            } else {
                header.style.backgroundColor = '';
                header.style.paddingBlock = '';
            }
        });
    </script>
